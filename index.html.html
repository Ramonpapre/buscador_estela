<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de recursos e-stela</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --card: rgba(255,255,255,0.82);
    --card-solid: #ffffff;
    --border: #dde2ef;
    --border-dark: #c4cade;
    --accent: #7c6af7;
    --accent2: #56d4b0;
    --accent3: #f7856a;
    --text: #1a1d2e;
    --muted: #6b7494;
    --tag-bg: #f0f2fa;
    --match-bg: rgba(124,106,247,0.15);
    --match: #5a47d6;
    --header-bg: rgba(255,255,255,0.96);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
  }

  /* ── Background image area ── */
  .bg-image-wrap {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .bg-image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  /* White overlay — fades out when results appear */
  .bg-white-overlay {
    position: fixed;
    inset: 0;
    background: #ffffff;
    z-index: 0;
    pointer-events: none;
    transition: opacity 0.4s;
    opacity: 0;
  }

  /* ── Header ── */
  .header {
    background: var(--header-bg);
    border-bottom: 1.5px solid var(--border);
    padding: 1.6rem 2rem 1.2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  }

  .header-inner { max-width: 1200px; margin: 0 auto; }

  .brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.1rem;
  }

  .brand h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em; color: var(--text); }
  .brand p  { font-size: 0.7rem; color: var(--muted); font-weight: 400; }

  /* ── Search ── */
  .search-boxes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1rem;
    min-width: 0;
  }

  .search-boxes > * { min-width: 0; }

  @media (max-width: 700px) {
    .search-boxes { grid-template-columns: 1fr; }
  }

  .search-wrap { position: relative; }

  .search-icon {
    position: absolute; left: 1rem; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); font-size: 1rem; pointer-events: none;
  }

  .clear-btn {
    position: absolute; right: 0.85rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1.05rem; line-height: 1;
    padding: 0.2rem; border-radius: 4px;
    transition: color 0.15s;
    display: none;
  }
  .clear-btn:hover { color: var(--text); }

  #search, #searchRie {
    width: 100%;
    background: #fff;
    border: 1.5px solid var(--border-dark);
    border-radius: 12px;
    padding: 0.82rem 2.5rem 0.82rem 2.8rem;
    font-family: 'Sora', sans-serif;
    font-size: 0.93rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-width: 0;
  }
  #search::placeholder, #searchRie::placeholder { color: var(--muted); }
  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.12);
  }
  #searchRie:focus {
    border-color: #00a389;
    box-shadow: 0 0 0 3px rgba(0,163,137,0.12);
  }

  /* ── Filters ── */
  .filters { display: flex; flex-direction: column; gap: 0.55rem; }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 0.67rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
    min-width: 110px;
  }
  .filter-label.lbl-grado   { color: #6c5ce7; }
  .filter-label.lbl-espacio { color: #00a389; }
  .filter-label.lbl-unidad  { color: #d6502a; }

  /* ── Pills ── */
  .filter-pills { display: flex; flex-wrap: wrap; gap: 0.35rem; }

  .pill {
    background: var(--tag-bg);
    border: 1.5px solid var(--border-dark);
    border-radius: 20px;
    padding: 0.24rem 0.72rem;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    white-space: nowrap;
    font-family: 'Sora', sans-serif;
  }
  .pill:hover { border-color: #9b90f5; color: #5a47d6; background: #eeecff; }
  .pill:active { transform: scale(0.96); }

  .pill.active.grado {
    background: #eeecff; border-color: #7c6af7; color: #5a47d6; font-weight: 600;
  }
  .pill.active.espacio {
    background: #e6faf6; border-color: #56d4b0; color: #00836d; font-weight: 600;
  }

  /* ── Dropdown ── */
  .dropdown-wrap { position: relative; display: inline-block; }

  .dropdown-trigger {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--tag-bg);
    border: 1.5px solid var(--border-dark);
    border-radius: 20px;
    padding: 0.24rem 0.85rem;
    font-size: 0.72rem; font-weight: 500;
    color: var(--muted);
    cursor: pointer; user-select: none;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: 'Sora', sans-serif;
  }
  .dropdown-trigger:hover { border-color: var(--accent3); color: #c04520; background: #fff0ec; }
  .dropdown-trigger.has-selection {
    background: #fff0ec; border-color: var(--accent3); color: #c04520; font-weight: 600;
  }

  .dropdown-arrow { font-size: 0.6rem; transition: transform 0.2s; }
  .dropdown-wrap.open .dropdown-arrow { transform: rotate(180deg); }

  .dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 6px); left: 0;
    min-width: 260px;
    background: #fff;
    border: 1.5px solid var(--border-dark);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    z-index: 200;
    overflow: hidden;
    animation: fadeIn 0.15s ease;
    max-height: 320px;
    overflow-y: auto;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .dropdown-wrap.open .dropdown-menu { display: block; }

  .dropdown-item {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.6rem 1rem;
    font-size: 0.78rem; color: var(--muted);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    border-bottom: 1px solid #f0f2fa;
    user-select: none;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: #fff0ec; color: var(--text); }
  .dropdown-item.selected { color: #c04520; background: #fff8f6; font-weight: 600; }

  .dropdown-item .check { font-size: 0.75rem; width: 14px; flex-shrink: 0; opacity: 0; }
  .dropdown-item.selected .check { opacity: 1; }

  /* ── Stats bar ── */
  .stats-bar {
    max-width: 1200px; margin: 0 auto;
    padding: 0.65rem 2rem;
    font-size: 0.77rem; color: var(--muted);
    display: flex; align-items: center; gap: 0.5rem;
    flex-wrap: wrap;
    position: relative; z-index: 10;
  }

  .stats-count { font-family: 'JetBrains Mono', monospace; color: #00836d; font-weight: 600; }

  .active-filters { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-left: 0.5rem; }

  .active-chip {
    background: #eeecff; border: 1px solid #c5bfff;
    border-radius: 20px; padding: 0.1rem 0.5rem;
    font-size: 0.68rem; color: #5a47d6;
  }

  /* ── Main ── */
  .main {
    max-width: 1200px; margin: 0 auto;
    padding: 0.5rem 2rem 3rem;
    position: relative; z-index: 10;
  }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 5rem 2rem; color: var(--muted); }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text); }
  .empty p { font-size: 0.85rem; }

  /* ── Result card ── */
  .result-card {
    background: var(--card);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 14px;
    margin-bottom: 0.85rem;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .result-card:hover {
    border-color: rgba(124,106,247,0.5);
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(124,106,247,0.12);
  }

  /* No-results card: solid white */
  .result-card.solid {
    background: var(--card-solid);
    backdrop-filter: none;
  }

  .card-head {
    padding: 0.9rem 1.25rem 0.8rem;
    border-bottom: 1px solid rgba(220,225,240,0.8);
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 1rem;
  }

  .card-contenido { font-size: 0.87rem; font-weight: 500; line-height: 1.5; color: var(--text); flex: 1; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; flex-shrink: 0; align-items: flex-start; max-width: 260px; }

  .tag {
    background: var(--tag-bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.18rem 0.5rem;
    font-size: 0.68rem; font-weight: 500; color: var(--muted); white-space: nowrap;
  }
  .tag.grado   { background: #eeecff; border-color: #c5bfff; color: #5a47d6; }
  .tag.unidad  { background: #e6faf6; border-color: #9ee8d4; color: #00836d; }
  .tag.espacio { background: #fff0ec; border-color: #f7c4b6; color: #c04520; }

  .card-body { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }

  .col-item {
    padding: 0.8rem 1.25rem;
    border-right: 1px solid rgba(220,225,240,0.7);
    border-bottom: 1px solid rgba(220,225,240,0.7);
  }
  .col-item:last-child { border-right: none; }

  .col-label { font-size: 0.63rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
  .col-value { font-size: 0.79rem; line-height: 1.55; color: var(--text); white-space: pre-wrap; }
  .col-value.empty-val { color: #c8cfe0; font-style: italic; font-size: 0.73rem; }

  mark { background: rgba(124,106,247,0.15); color: #5a47d6; border-radius: 3px; padding: 0 2px; font-weight: 600; }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .header { padding: 1.1rem 1rem 1rem; }
    .main { padding: 0.5rem 1rem 3rem; }
    .stats-bar { padding: 0.65rem 1rem; }
    .filter-label { min-width: 80px; font-size: 0.62rem; }
    .card-tags { max-width: 140px; }
    .card-body { grid-template-columns: 1fr; }
    .col-item { border-right: none; }
    .dropdown-menu { min-width: 220px; }
  }
</style>
</head>

const COLUMNS = DB.columns;
const RECORDS = DB.records;

const SEARCH_COL = COLUMNS[0];
const DISPLAY_COLS = COLUMNS.filter(c => !['Grado','Espacio','Unidad curricular'].includes(c) && c !== SEARCH_COL);

function unique(field) {
  const seen = new Set(), vals = [];
  RECORDS.forEach(r => {
    const v = (r[field] || '').trim().replace(/\s+/g,' ');
    if (v && !seen.has(v)) { seen.add(v); vals.push(v); }
  });
  return vals.sort();
}

const OPTIONS = {
  grado:   unique('Grado'),
  espacio: unique('Espacio'),
  unidad:  unique('Unidad curricular'),
};

const active = { grado: new Set(), espacio: new Set() };
let activeUnidad = null;

// ── Pills ─────────────────────────────────────────────────────────
function buildPills(group, containerId) {
  const container = document.getElementById(containerId);
  OPTIONS[group].forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'pill ' + group;
    btn.textContent = val;
    btn.dataset.val = val;
    btn.addEventListener('click', () => {
      if (active[group].has(val)) {
        active[group].delete(val);
        btn.classList.remove('active');
      } else {
        active[group].add(val);
        btn.classList.add('active');
      }
      renderResults();
    });
    container.appendChild(btn);
  });
}

buildPills('grado',   'pills-grado');
buildPills('espacio', 'pills-espacio');

// ── Dropdown ──────────────────────────────────────────────────────
const dropdownMenu    = document.getElementById('dropdownMenu');
const dropdownWrap    = document.getElementById('dropdownWrap');
const dropdownTrigger = document.getElementById('dropdownTrigger');
const dropdownLabel   = document.getElementById('dropdownLabel');

const allItem = document.createElement('div');
allItem.className = 'dropdown-item selected';
allItem.innerHTML = '<span class="check">✓</span> Todas las unidades';
allItem.addEventListener('click', () => {
  activeUnidad = null;
  updateDropdownUI();
  closeDropdown();
  renderResults();
});
dropdownMenu.appendChild(allItem);

const dropdownItems = {};
OPTIONS.unidad.forEach(val => {
  const item = document.createElement('div');
  item.className = 'dropdown-item';
  item.innerHTML = `<span class="check">✓</span> ${escHtml(val)}`;
  item.addEventListener('click', () => {
    activeUnidad = val;
    updateDropdownUI();
    closeDropdown();
    renderResults();
  });
  dropdownMenu.appendChild(item);
  dropdownItems[val] = item;
});

function updateDropdownUI() {
  allItem.classList.toggle('selected', activeUnidad === null);
  OPTIONS.unidad.forEach(val => {
    dropdownItems[val].classList.toggle('selected', activeUnidad === val);
  });
  if (activeUnidad === null) {
    dropdownLabel.textContent = 'Todas las unidades';
    dropdownTrigger.classList.remove('has-selection');
  } else {
    dropdownLabel.textContent = activeUnidad;
    dropdownTrigger.classList.add('has-selection');
  }
}

dropdownTrigger.addEventListener('click', e => {
  e.stopPropagation();
  dropdownWrap.classList.toggle('open');
});

function closeDropdown() { dropdownWrap.classList.remove('open'); }
document.addEventListener('click', e => { if (!dropdownWrap.contains(e.target)) closeDropdown(); });

// ── Utils ─────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return escHtml(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return escHtml(text).replace(re, '<mark>$1</mark>');
}

  const hasUnidad  = activeUnidad !== null;
  const hasAny     = hasQ || hasQRie || hasGrado || hasEspacio || hasUnidad;

  clearBtn.style.display    = hasQ    ? 'block' : 'none';
  clearBtnRie.style.display = hasQRie ? 'block' : 'none';

  if (!hasAny) {
    document.body.classList.remove('has-results');
    statsBar.style.display = 'none';
    statsBar.innerHTML = '';
    resultsEl.innerHTML = `<div class="empty"></div>`;
    return;
  }

  const matches = RECORDS.filter(r => {
    const contenido = (r[SEARCH_COL] || '').toLowerCase();
    const rie       = (r['RIE'] || '').toLowerCase();
    const grado     = (r['Grado'] || '').trim().replace(/\s+/g,' ');
    const espacio   = (r['Espacio'] || '').trim().replace(/\s+/g,' ');
    const unidad    = (r['Unidad curricular'] || '').trim().replace(/\s+/g,' ');

    if (hasQ       && !contenido.includes(q))       return false;
    if (hasQRie    && !rie.includes(qRie))           return false;
    if (hasGrado   && !active.grado.has(grado))     return false;
    if (hasEspacio && !active.espacio.has(espacio)) return false;
    if (hasUnidad  && unidad !== activeUnidad)       return false;
    return true;
  });

  // Show/hide background image
  if (matches.length > 0) {
    document.body.classList.add('has-results');
  } else {
    document.body.classList.remove('has-results');
  }

  const chips = [
    ...[...active.grado].map(v   => `<span class="active-chip">📚 ${escHtml(v)}</span>`),
    ...[...active.espacio].map(v => `<span class="active-chip">🗂 ${escHtml(v)}</span>`),
    ...(hasUnidad ? [`<span class="active-chip">📖 ${escHtml(activeUnidad)}</span>`] : []),
  ].join('');

  statsBar.style.display = 'flex';
  statsBar.innerHTML = `<span class="stats-count">${matches.length}</span>&nbsp;resultado${matches.length !== 1 ? 's' : ''}
    ${hasQ    ? `en contenidos para "<em>${escHtml(searchEl.value.trim())}</em>"` : ''}
    ${hasQRie ? `en RIE para "<em>${escHtml(searchRieEl.value.trim())}</em>"` : ''}
    ${chips ? `<span class="active-filters">${chips}</span>` : ''}`;

  if (matches.length === 0) {
    resultsEl.innerHTML = `<div class="empty">
      <div class="empty-icon">😕</div>
      <h2>Sin resultados</h2>
      <p>Probá con otros términos o filtros.</p>
    </div>`;
    return;
  }

  resultsEl.innerHTML = matches.map(r => {
    const contenido = r[SEARCH_COL] || '';
    const rie     = (r['RIE'] || '').trim();
    const grado   = r['Grado'] || '';
    const unidad  = (r['Unidad curricular'] || '').trim();
    const espacio = (r['Espacio'] || '').trim();

    const tags = [
      grado   ? `<span class="tag grado">${escHtml(grado)}</span>` : '',
      espacio ? `<span class="tag espacio">${escHtml(espacio)}</span>` : '',
      unidad  ? `<span class="tag unidad">${escHtml(unidad)}</span>` : '',
    ].filter(Boolean).join('');

    const colsHtml = DISPLAY_COLS.map(col => {
      const val = (r[col] || '').trim();
      // Highlight RIE column with its own query
      const displayVal = col === 'RIE'
        ? highlight(val, qRie) || '<span class="empty-val">—</span>'
        : (val ? escHtml(val) : '<span class="empty-val">—</span>');
      return `<div class="col-item">
        <div class="col-label">${escHtml(col)}</div>
        <div class="col-value">${displayVal}</div>
      </div>`;
    }).join('');

    return `<div class="result-card">
      <div class="card-head">
        <div class="card-contenido">${highlight(contenido, q)}</div>
        <div class="card-tags">${tags}</div>
      </div>
      <div class="card-body">${colsHtml}</div>
    </div>`;
  }).join('');
}

let debounce;
searchEl.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(renderResults, 200);
});

searchRieEl.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(renderResults, 200);
});

clearBtn.addEventListener('click', () => {
  searchEl.value = '';
  clearBtn.style.display = 'none';
  renderResults();
  searchEl.focus();
});

clearBtnRie.addEventListener('click', () => {
  searchRieEl.value = '';
  clearBtnRie.style.display = 'none';
  renderResults();
  searchRieEl.focus();
});

searchEl.focus();
</script>
</body>
</html>
